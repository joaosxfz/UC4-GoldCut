<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css">

    <title>Agendamento - GoldCut</title>
</head>

<body class="bg-black text-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-warning">

        <div class="container">

            <a class="navbar-brand fw-bold text-warning" href="#">
                GoldCut
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Início</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Serviços</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contato</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- AGENDAMENTO -->
    <section id="agendamento" class="container py-5">

        <h2 class="text-center text-warning mb-5">
            Agendamento
        </h2>

        <div class="row justify-content-center">

            <div class="col-md-8">

                <form class="bg-dark p-4 rounded border border-warning">

                    <div class="mb-3">

                        <label class="form-label text-light">Nome</label>

                        <input type="text" class="form-control" placeholder="Digite seu nome">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-light">Telefone</label>

                        <input type="text" class="form-control" placeholder="(47) 99999-9999">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-light">Serviço</label>

                        <select class="form-select">

                            <option>Corte</option>
                            <option>Barba</option>
                            <option>Combo</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-light">Data</label>

                        <input type="date" class="form-control">

                    </div>

                    <div class="mb-4">

                        <label class="form-label text-light">Horários Disponíveis</label>

                        <select class="form-select">

                            <option>09:00</option>
                            <option>10:00</option>
                            <option>11:00</option>
                            <option>14:00</option>
                            <option>15:00</option>
                            <option>16:00</option>

                        </select>

                    </div>

                    <button class="btn btn-warning w-100 fw-bold">
                        Confirmar Agendamento
                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- FOOTER -->
    <footer class="text-center p-4 border-top border-warning">

        <p class="text-warning fw-bold">GoldCut</p>
        <p>© 2026 - Todos os direitos reservados</p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
