</head>

<body class="bg-black text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-warning">

        <div class="container">

             <a class="navbar-brand fw-bold" href="./index.html">
                GoldCut
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">Início</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="./servicos.html">Serviços</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="agendamento.html">Agendamento</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="./assinatura.html">Assinaturas</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="./atendimento.html">Atendimento</a>

                    <li class="nav-item">
                        <a class="nav-link" href="./sobre.html">Sobre</a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <section class="container py-5">

        <h2 class="text-center text-warning mb-5">
            Agendamento
        </h2>

        <div class="row justify-content-center">

            <div class="col-md-8">

                <form class="bg-dark p-4 rounded border border-warning">

                    <div class="mb-3">

                        <label class="form-label text-light">
                            Nome
                        </label>

                        <input type="text" class="form-control" placeholder="Digite seu nome">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-light">
                            Telefone
                        </label>

                        <input type="text" class="form-control" placeholder="(47) 99999-9999">

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-light">
                            Serviço
                        </label>

                        <select class="form-select">

                            <option>Corte</option>

                            <option>Barba</option>

                            <option>Combo</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label text-light">
                            Data
                        </label>

                        <input type="date" class="form-control">

                    </div>

                    <div class="mb-4">

                        <label class="form-label text-light">
                            Horários Disponíveis
                        </label>

                        <select class="form-select">

                            <option>09:00</option>

                            <option>10:00</option>

                            <option>11:00</option>

                            <option>14:00</option>

                            <option>15:00</option>

                            <option>16:00</option>

                        </select>

                    </div>

                    <button class="btn btn-warning w-100 fw-bold">

                        Confirmar Agendamento

                    </button>

                </form>

            </div>

        </div>

    </section>

    <footer class="text-center p-4 border-top border-warning">

        <h4 class="text-warning">
            Contato
        </h4>

        <p>WhatsApp: (47) 4002-8922</p>

        <p>Instagram: @goldcut</p>

        <p>Joinville - SC</p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
